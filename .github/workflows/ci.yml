name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  APP_NAME: kryx-codecs-opus
  CARGO_TERM_COLOR: always
  ZIG_VERSION: 0.14.1
  NODE_VERSION: 22

jobs:
  # ═════════════════════════════════════════════════════════════════════════
  # Rust tests + FFI verification across all 3 platforms
  # M2 acceptance gate: Zig builds libopus, Rust links + calls it, on all OSes.
  # ═════════════════════════════════════════════════════════════════════════
  rust-test:
    name: Rust + FFI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Zig ${{ env.ZIG_VERSION }}
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Verify Zig
        run: zig version
      - name: Run Rust tests (Zig builds libopus, FFI verified)
        run: cargo test --workspace --exclude opus-node --verbose

  # ═════════════════════════════════════════════════════════════════════════
  # Clippy + Rustfmt
  # ═════════════════════════════════════════════════════════════════════════
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: cargo clippy --workspace --all-targets -- -D warnings

  rustfmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # ═════════════════════════════════════════════════════════════════════════
  # TypeScript tests + full native build (Zig → Rust → NAPI → .node)
  # ═════════════════════════════════════════════════════════════════════════
  ts-test:
    name: TypeScript + native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: npm install
      - run: npm run typecheck
      - run: npm run lint
      - name: Build native (Zig + Rust + NAPI)
        run: npm run build:native:debug
      - run: npm run test:vitest
      - name: Smoke test — libopusVersion returns real version
        run: node -e "const {libopusVersion}=require('./'); const v=libopusVersion(); console.log(v); if(!v.includes('libopus 1.')) process.exit(1)"

  # ═════════════════════════════════════════════════════════════════════════
  # Cross-platform native builds (compile-only)
  # ═════════════════════════════════════════════════════════════════════════
  native-build:
    name: ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: npm install
      - name: Build native
        run: npm run build:native
