name: Release

on:
  push:
    tags:
      - 'v*'

env:
  APP_NAME: kryx-codecs-opus
  CARGO_TERM_COLOR: always
  ZIG_VERSION: 0.14.1
  NODE_VERSION: 22

jobs:
  build-natives:
    name: ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
          # macOS pinned to macos-14 (Xcode 26.4 on macos-latest breaks
          # Zig 0.14.1 — see ziglang/zig#31658)
          - host: macos-14
            target: x86_64-apple-darwin
          - host: macos-14
            target: aarch64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install Zig ${{ env.ZIG_VERSION }}
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: npm install
      - run: npm run build:native
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            *.node
            index.js
            index.d.ts

  publish:
    needs: build-natives
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: npm run build:ts
      - name: Move artifacts into per-platform npm packages
        run: npm run artifacts
      - name: Publish per-platform sub-packages
        run: |
          for dir in npm/*/; do
            cd "$dir"
            npm publish --access public --tag alpha
            cd -
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish main package
        run: npm publish --access public --tag alpha
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
